<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>毎日ジャーナル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet" />
 <style>
    :root {
      --bg: #fffbf7;
      --surface: #ffffff;
      --text: #3d3429;
      --text-muted: #7a6f63;
      --accent-orange: #fb923c;
      --accent-yellow: #fcd34d;
      --border: rgba(251, 146, 60, 0.22);
      --shadow: 0 8px 32px rgba(251, 146, 60, 0.12), 0 2px 8px rgba(0, 0, 0, 0.04);
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 0 3rem;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
      grid-template-rows: auto auto;
      gap: 1.25rem 1.5rem;
      max-width: 1120px;
      margin: 0 auto;
      padding: 1rem;
      align-items: start;
    }
    .col-left { grid-column: 1; grid-row: 1; min-width: 0; }
    .col-list { grid-column: 1; grid-row: 2; min-width: 0; }
    .col-right {
      grid-column: 2;
      grid-row: 1 / -1;
      position: sticky;
      top: 1rem;
      align-self: start;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      min-width: 0;
    }
    .col-right > section:last-child { margin-bottom: 0; }
    @media (max-width: 768px) {
      .layout {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        max-width: 640px;
        padding: 1rem;
      }
      .col-left,
      .col-list,
      .col-right {
        grid-column: unset;
        grid-row: unset;
        width: 100%;
      }
      .col-right {
        position: static;
        max-height: none;
        overflow: visible;
      }
    }
    header { text-align: center; padding: 1.5rem 0 2rem; }
    header h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    header .sub { margin: 0; font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }
    section {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    section h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    section h2::before {
      content: "";
      width: 4px;
      height: 1.1em;
      background: linear-gradient(180deg, var(--accent-orange), var(--accent-yellow));
      border-radius: 4px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    input[type="date"], textarea {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.65rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fffefb;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="date"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 3px rgba(252, 211, 77, 0.35);
    }
    textarea { min-height: 4.5rem; resize: vertical; }
    .field { margin-bottom: 1rem; }
    .mood-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .mood-btn {
      flex: 1;
      min-width: 52px;
      padding: 0.65rem 0.4rem;
      font-size: 2rem;
      line-height: 1;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fffefb;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .mood-btn:hover { transform: scale(1.05); border-color: var(--accent-yellow); }
    .mood-btn.selected {
      border-color: var(--accent-orange);
      background: linear-gradient(145deg, #fff8ed, #fffef5);
      box-shadow: 0 4px 12px rgba(251, 146, 60, 0.2);
    }
    .btn-primary {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem 1.25rem;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-orange), #f59e0b);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(251, 146, 60, 0.35);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(251, 146, 60, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: #fffefb;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent-orange); background: #fffaf3; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    .stat-card {
      text-align: center;
      padding: 1rem;
      background: linear-gradient(160deg, #fffef8, #fff5e8);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .stat-card .num { font-size: 1.75rem; font-weight: 700; color: var(--accent-orange); line-height: 1.2; }
    .stat-card .lbl { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .chart-wrap { position: relative; width: 100%; height: 200px; margin-top: 0.5rem; }
    #moodChart { display: block; width: 100%; height: 200px; }
    .chart-legend { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 0.5rem; }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .cal-title { font-weight: 700; font-size: 1rem; }
    .cal-nav { display: flex; gap: 0.5rem; }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      border-radius: 10px;
      background: #fffefb;
      border: 1px solid transparent;
      position: relative;
    }
    .cal-cell.other { color: #c4b8a8; background: #faf8f5; }
    .cal-cell.today { border-color: var(--accent-orange); font-weight: 700; }
    .cal-cell.has-entry::after {
      content: "\2713";
      position: absolute;
      bottom: 2px;
      right: 3px;
      font-size: 0.65rem;
      color: var(--accent-orange);
      font-weight: 700;
    }
    .export-row { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      z-index: 100;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      pointer-events: none;
      max-width: calc(100% - 2rem);
      text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    .journal-card {
      background: linear-gradient(165deg, #ffffff, #fffbf5);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 1rem 1.1rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }
    .journal-card .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px dashed var(--border);
    }
    .journal-card .date-mood { display: flex; align-items: center; gap: 0.6rem; }
    .journal-card .emoji-lg { font-size: 2.25rem; line-height: 1; }
    .journal-card .date-str { font-weight: 700; font-size: 0.95rem; }
    .journal-card .btn-del {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(220, 100, 80, 0.4);
      background: #fff5f3;
      color: #c2410c;
      cursor: pointer;
    }
    .journal-card .btn-del:hover { background: #ffe8e4; }
    .journal-card .block { margin-bottom: 0.6rem; font-size: 0.88rem; }
    .journal-card .block:last-child { margin-bottom: 0; }
    .journal-card .blk-title { font-size: 0.72rem; font-weight: 700; color: var(--accent-orange); margin-bottom: 0.15rem; }
    .empty-hint { text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 1.5rem 0.5rem; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="col-left">
    <header>
      <h1>毎日ジャーナル</h1>
      <p class="sub">あなたの毎日を、言葉にしよう。</p>
    </header>
    <section aria-labelledby="form-title">
      <h2 id="form-title">今日の記録</h2>
      <form id="journalForm">
        <div class="field">
          <label for="entryDate">日付</label>
          <input type="date" id="entryDate" name="entryDate" required />
        </div>
        <div class="field">
          <label>今日の気分</label>
          <div class="mood-row" role="group" aria-label="気分の選択">
            <button type="button" class="mood-btn" data-mood="1" aria-pressed="false" title="とても落ち込み">😞</button>
            <button type="button" class="mood-btn" data-mood="2" aria-pressed="false" title="いまいち">😐</button>
            <button type="button" class="mood-btn" data-mood="3" aria-pressed="false" title="ふつう">🙂</button>
            <button type="button" class="mood-btn" data-mood="4" aria-pressed="false" title="いい感じ">😊</button>
            <button type="button" class="mood-btn selected" data-mood="5" aria-pressed="true" title="とても良い">😄</button>
          </div>
        </div>
        <div class="field">
          <label for="good">今日よかったこと</label>
          <textarea id="good" name="good" placeholder="小さなことでもOK"></textarea>
        </div>
        <div class="field">
          <label for="learn">今日の学び・気づき</label>
          <textarea id="learn" name="learn"></textarea>
        </div>
        <div class="field">
          <label for="feelings">今日の感情・気持ち</label>
          <textarea id="feelings" name="feelings"></textarea>
        </div>
        <div class="field">
          <label for="tomorrow">明日やること・目標</label>
          <textarea id="tomorrow" name="tomorrow"></textarea>
        </div>
        <div class="field">
          <label for="memo">自由メモ</label>
          <textarea id="memo" name="memo"></textarea>
        </div>
        <button type="submit" class="btn-primary">記録する</button>
      </form>
    </section>
    </div>
    <aside class="col-right" aria-label="カレンダー・気分グラフ・統計">
    <section aria-labelledby="cal-title-section">
      <h2 id="cal-title-section">カレンダー</h2>
      <div class="cal-header">
        <span class="cal-title" id="calMonthLabel"></span>
        <div class="cal-nav">
          <button type="button" class="btn-secondary" id="calPrev" aria-label="前月">←前月</button>
          <button type="button" class="btn-secondary" id="calNext" aria-label="次月">次月 →</button>
        </div>
      </div>
      <div class="cal-weekdays">
        <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </section>
    <section aria-labelledby="chart-title">
      <h2 id="chart-title">気分グラフ（過去14日）</h2>
      <div class="chart-wrap">
        <canvas id="moodChart" width="600" height="200" aria-label="過去14日間の気分の折れ線グラフ"></canvas>
      </div>
      <p class="chart-legend">縦軸：気分（低い←→高い）／横軸：日付</p>
    </section>
    <section aria-labelledby="stats-title">
      <h2 id="stats-title">統計</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">総記録日数</div></div>
        <div class="stat-card"><div class="num" id="statStreak">0</div><div class="lbl">連続記録日数</div></div>
        <div class="stat-card"><div class="num" id="statAvg">—</div><div class="lbl">今月の平均気分</div></div>
      </div>
      <div class="export-row">
        <button type="button" class="btn-secondary" id="btnExport">全記録をコピー</button>
      </div>
    </section>
    </aside>
    <div class="col-list">
    <section aria-labelledby="list-title">
      <h2 id="list-title">記録一覧</h2>
      <div class="cards" id="cardList"></div>
    </section>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
(function () {
  var STORAGE_KEY = "mainichi-journal-v1";
  var MOOD_EMOJI = { 1: "\uD83D\uDE1E", 2: "\uD83D\uDE10", 3: "\uD83D\uDE42", 4: "\uD83D\uDE0A", 5: "\uD83D\uDE04" };

  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }
  function saveEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

  function todayISO() {
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }
  function parseISO(iso) {
    var p = iso.split("-").map(Number);
    return new Date(p[0], p[1] - 1, p[2]);
  }
  function formatJaDate(iso) {
    var dt = parseISO(iso);
    return dt.getFullYear() + "\u5E74" + (dt.getMonth() + 1) + "\u6708" + dt.getDate() + "\u65E5";
  }
  function toISO(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  var selectedMood = 5;
  var calYear = new Date().getFullYear();
  var calMonth = new Date().getMonth();

  var form = document.getElementById("journalForm");
  var entryDate = document.getElementById("entryDate");
  var moodBtns = document.querySelectorAll(".mood-btn");
  var cardList = document.getElementById("cardList");
  var calGrid = document.getElementById("calGrid");
  var calMonthLabel = document.getElementById("calMonthLabel");
  var calPrev = document.getElementById("calPrev");
  var calNext = document.getElementById("calNext");
  var statTotal = document.getElementById("statTotal");
  var statStreak = document.getElementById("statStreak");
  var statAvg = document.getElementById("statAvg");
  var btnExport = document.getElementById("btnExport");
  var toast = document.getElementById("toast");
  var canvas = document.getElementById("moodChart");
  var ctx = canvas.getContext("2d");

  entryDate.value = todayISO();

  moodBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      moodBtns.forEach(function (b) {
        b.classList.remove("selected");
        b.setAttribute("aria-pressed", "false");
      });
      btn.classList.add("selected");
      btn.setAttribute("aria-pressed", "true");
      selectedMood = Number(btn.dataset.mood);
    });
  });

  function uniqueDates(entries) {
    var set = new Set();
    entries.forEach(function (e) { set.add(e.date); });
    return set;
  }

  function computeStreak(entries) {
    var dateSet = uniqueDates(entries);
    if (dateSet.size === 0) return 0;
    var streak = 0;
    var cur = new Date();
    cur.setHours(12, 0, 0, 0);
    for (var i = 0; i < 366 * 10; i++) {
      var iso = toISO(cur);
      if (dateSet.has(iso)) {
        streak++;
        cur.setDate(cur.getDate() - 1);
      } else break;
    }
    return streak;
  }

  function statsThisMonthAvg(entries) {
    var now = new Date();
    var y = now.getFullYear();
    var m = now.getMonth() + 1;
    var prefix = y + "-" + String(m).padStart(2, "0");
    var moods = [];
    entries.forEach(function (e) {
      if (e.date.indexOf(prefix) === 0) moods.push(e.mood);
    });
    if (moods.length === 0) return null;
    var sum = 0;
    moods.forEach(function (v) { sum += v; });
    return (sum / moods.length).toFixed(2);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () { toast.classList.remove("show"); }, 2600);
  }

  function drawChart(entries) {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var cw = rect.width;
    var ch = rect.height;
    ctx.clearRect(0, 0, cw, ch);

    var today = new Date();
    today.setHours(12, 0, 0, 0);
    var points = [];
    for (var i = 13; i >= 0; i--) {
      var d = new Date(today);
      d.setDate(d.getDate() - i);
      var iso = toISO(d);
      var dayEntries = entries.filter(function (e) { return e.date === iso; });
      var val = null;
      if (dayEntries.length) {
        var s = 0;
        dayEntries.forEach(function (e) { s += e.mood; });
        val = s / dayEntries.length;
      }
      var mm = String(d.getMonth() + 1);
      var dd = String(d.getDate());
      points.push({ iso: iso, val: val, label: mm + "/" + dd });
    }

    var padL = 36, padR = 12, padT = 16, padB = 28;
    var gw = cw - padL - padR;
    var gh = ch - padT - padB;
    var ymin = 1, ymax = 5;

    ctx.strokeStyle = "rgba(251, 146, 60, 0.25)";
    ctx.lineWidth = 1;
    for (var g = 1; g <= 5; g++) {
      var gy = padT + gh - ((g - ymin) / (ymax - ymin)) * gh;
      ctx.beginPath();
      ctx.moveTo(padL, gy);
      ctx.lineTo(padL + gw, gy);
      ctx.stroke();
      ctx.fillStyle = "#7a6f63";
      ctx.font = "11px 'M PLUS Rounded 1c', sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(String(g), padL - 6, gy + 4);
    }

    var xs = points.map(function (_, i) { return padL + (i / (points.length - 1 || 1)) * gw; });
    function toY(v) { return padT + gh - ((v - ymin) / (ymax - ymin)) * gh; }

    var hasAny = points.some(function (p) { return p.val != null; });
    if (hasAny) {
      ctx.strokeStyle = "#fb923c";
      ctx.lineWidth = 2.5;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      var started = false;
      points.forEach(function (p, i) {
        if (p.val == null) { started = false; return; }
        var x = xs[i], y = toY(p.val);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      points.forEach(function (p, i) {
        if (p.val == null) return;
        var x = xs[i], y = toY(p.val);
        ctx.fillStyle = "#fcd34d";
        ctx.strokeStyle = "#fb923c";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });
    } else {
      ctx.fillStyle = "#7a6f63";
      ctx.font = "14px 'M PLUS Rounded 1c', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("\u307E\u3060\u30C7\u30FC\u30BF\u304C\u3042\u308A\u307E\u305B\u3093", cw / 2, ch / 2);
    }
    ctx.fillStyle = "#7a6f63";
    ctx.font = "10px 'M PLUS Rounded 1c', sans-serif";
    ctx.textAlign = "center";
    var step = points.length > 7 ? 2 : 1;
    points.forEach(function (p, i) {
      if (i % step !== 0 && i !== points.length - 1) return;
      ctx.fillText(p.label, xs[i], ch - 8);
    });
  }

  function renderCalendar(entries) {
    var dateSet = uniqueDates(entries);
    calMonthLabel.textContent = calYear + "\u5E74" + (calMonth + 1) + "\u6708";
    var first = new Date(calYear, calMonth, 1);
    var startPad = first.getDay();
    var lastDay = new Date(calYear, calMonth + 1, 0).getDate();
    var prevLast = new Date(calYear, calMonth, 0).getDate();
    calGrid.innerHTML = "";
    var today = new Date();
    function isTodayCell(d) {
      return d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    }
    var i, d, c, iso;
    for (i = 0; i < startPad; i++) {
      var dayNum = prevLast - startPad + i + 1;
      c = document.createElement("div");
      c.className = "cal-cell other";
      c.textContent = String(dayNum);
      calGrid.appendChild(c);
    }
    for (d = 1; d <= lastDay; d++) {
      c = document.createElement("div");
      c.className = "cal-cell";
      c.textContent = String(d);
      iso = calYear + "-" + String(calMonth + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      if (dateSet.has(iso)) c.classList.add("has-entry");
      if (isTodayCell(d)) c.classList.add("today");
      calGrid.appendChild(c);
    }
    var total = calGrid.children.length;
    var rem = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (i = 1; i <= rem; i++) {
      c = document.createElement("div");
      c.className = "cal-cell other";
      c.textContent = String(i);
      calGrid.appendChild(c);
    }
  }

  function renderCards(entries) {
    var sorted = entries.slice().sort(function (a, b) {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      return (b.createdAt || "").localeCompare(a.createdAt || "");
    });
    cardList.innerHTML = "";
    if (sorted.length === 0) {
      var p = document.createElement("p");
      p.className = "empty-hint";
      p.textContent = "\u307E\u3060\u8A18\u9332\u304C\u3042\u308A\u307E\u305B\u3093\u3002\u30D5\u30A9\u30FC\u30E0\u304B\u3089\u66F8\u304D\u59CB\u3081\u307E\u3057\u3087\u3046\u3002";
      cardList.appendChild(p);
      return;
    }
    sorted.forEach(function (e) {
      var card = document.createElement("article");
      card.className = "journal-card";
      var head = document.createElement("div");
      head.className = "card-head";
      var dm = document.createElement("div");
      dm.className = "date-mood";
      var em = document.createElement("span");
      em.className = "emoji-lg";
      em.textContent = MOOD_EMOJI[e.mood] || MOOD_EMOJI[3];
      var ds = document.createElement("span");
      ds.className = "date-str";
      ds.textContent = formatJaDate(e.date);
      dm.appendChild(em);
      dm.appendChild(ds);
      var del = document.createElement("button");
      del.type = "button";
      del.className = "btn-del";
      del.textContent = "\u524A\u9664";
      del.addEventListener("click", function () {
        if (!confirm("\u3053\u306E\u8A18\u9332\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")) return;
        var next = loadEntries().filter(function (x) { return x.id !== e.id; });
        saveEntries(next);
        refresh();
      });
      head.appendChild(dm);
      head.appendChild(del);
      card.appendChild(head);
      var blocks = [
        ["\u4ECA\u65E5\u3088\u304B\u3063\u305F\u3053\u3068", e.good],
        ["\u4ECA\u65E5\u306E\u5B66\u3073\u30FB\u6C17\u3065\u304D", e.learn],
        ["\u4ECA\u65E5\u306E\u611F\u60C5\u30FB\u6C17\u6301\u3061", e.feelings],
        ["\u660E\u65E5\u3084\u308B\u3053\u3068\u30FB\u76EE\u6A19", e.tomorrow],
        ["\u81EA\u7531\u30E1\u30E2", e.memo]
      ];
      blocks.forEach(function (pair) {
        var title = pair[0], text = pair[1];
        if (!text || !String(text).trim()) return;
        var wrap = document.createElement("div");
        wrap.className = "block";
        var t = document.createElement("div");
        t.className = "blk-title";
        t.textContent = title;
        var body = document.createElement("div");
        body.textContent = text;
        wrap.appendChild(t);
        wrap.appendChild(body);
        card.appendChild(wrap);
      });
      cardList.appendChild(card);
    });
  }

  function refresh() {
    var entries = loadEntries();
    var dates = uniqueDates(entries);
    statTotal.textContent = String(dates.size);
    statStreak.textContent = String(computeStreak(entries));
    var avg = statsThisMonthAvg(entries);
    statAvg.textContent = avg == null ? "\u2014" : avg;
    drawChart(entries);
    renderCalendar(entries);
    renderCards(entries);
  }

  form.addEventListener("submit", function (ev) {
    ev.preventDefault();
    var entries = loadEntries();
    var id = (typeof crypto !== "undefined" && crypto.randomUUID)
      ? crypto.randomUUID()
      : "j-" + Date.now() + "-" + Math.random().toString(36).slice(2);
    var rec = {
      id: id,
      date: entryDate.value,
      mood: selectedMood,
      good: document.getElementById("good").value.trim(),
      learn: document.getElementById("learn").value.trim(),
      feelings: document.getElementById("feelings").value.trim(),
      tomorrow: document.getElementById("tomorrow").value.trim(),
      memo: document.getElementById("memo").value.trim(),
      createdAt: new Date().toISOString()
    };
    entries.push(rec);
    saveEntries(entries);
    form.reset();
    entryDate.value = todayISO();
    selectedMood = 5;
    moodBtns.forEach(function (b) {
      var on = Number(b.dataset.mood) === 5;
      b.classList.toggle("selected", on);
      b.setAttribute("aria-pressed", on ? "true" : "false");
    });
    refresh();
    showToast("\u8A18\u9332\u3092\u4FDD\u5B58\u3057\u307E\u3057\u305F");
  });

  calPrev.addEventListener("click", function () {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    refresh();
  });
  calNext.addEventListener("click", function () {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    refresh();
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }

  btnExport.addEventListener("click", function () {
    var entries = loadEntries();
    var sorted = entries.slice().sort(function (a, b) {
      var c = a.date.localeCompare(b.date);
      if (c !== 0) return c;
      return (a.createdAt || "").localeCompare(b.createdAt || "");
    });
    var text = "\u3010\u6BCE\u65E5\u30B8\u30E3\u30FC\u30CA\u30EB \u30A8\u30AF\u30B9\u30DD\u30FC\u30C8\u3011\n\n";
    sorted.forEach(function (e, idx) {
      text += "---\u8A18\u9332 " + (idx + 1) + " ---\n";
      text += "\u65E5\u4ED8: " + formatJaDate(e.date) + " (" + e.date + ")\n";
      text += "\u6C17\u5206: " + (MOOD_EMOJI[e.mood] || "") + " (" + e.mood + "/5)\n";
      if (e.good) text += "\u4ECA\u65E5\u3088\u304B\u3063\u305F\u3053\u3068: " + e.good + "\n";
      if (e.learn) text += "\u5B66\u3073\u30FB\u6C17\u3065\u304D: " + e.learn + "\n";
      if (e.feelings) text += "\u611F\u60C5\u30FB\u6C17\u6301\u3061: " + e.feelings + "\n";
      if (e.tomorrow) text += "\u660E\u65E5\u3084\u308B\u3053\u3068: " + e.tomorrow + "\n";
      if (e.memo) text += "\u81EA\u7531\u30E1\u30E2: " + e.memo + "\n";
      text += "\n";
    });
    function copied() {
      showToast("\u30AF\u30EA\u30C3\u30D7\u30DC\u30FC\u30C9\u306B\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F");
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(copied).catch(function () {
        fallbackCopy(text);
        copied();
      });
    } else {
      fallbackCopy(text);
      copied();
    }
  });

  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () { drawChart(loadEntries()); }, 150);
  });

  refresh();
})();
  </script>

</body>
</html>
