<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Business Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c10;
      --bg-panel: #12151c;
      --bg-elevated: #181c26;
      --bg-input: #0e1118;
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(120, 160, 255, 0.22);
      --text: #e8eaef;
      --text-muted: #8b92a5;
      --accent: #5b8cff;
      --accent-soft: rgba(91, 140, 255, 0.14);
      --accent-glow: rgba(91, 140, 255, 0.45);
      --success: #3dd68c;
      --radius: 12px;
      --radius-sm: 8px;
      --font: "DM Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(91, 140, 255, 0.12), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(61, 214, 140, 0.04), transparent);
    }

    .app {
      display: flex;
      min-height: 100vh;
      max-width: 1920px;
      margin: 0 auto;
    }

    .col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg-panel);
    }

    .col:last-child {
      border-right: none;
    }

    .col--left {
      flex: 0 0 20%;
      max-width: 20%;
      min-width: 180px;
    }

    .col--center {
      flex: 0 0 50%;
      max-width: 50%;
      min-width: 280px;
      background: linear-gradient(180deg, #0f1218 0%, var(--bg-panel) 32%);
    }

    .col--right {
      flex: 0 0 30%;
      max-width: 30%;
      min-width: 240px;
    }

    .panel-header {
      padding: 1.25rem 1.25rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .kb-list {
      flex: 1;
      padding: 0 0.75rem 1rem;
      overflow-y: auto;
    }

    .kb-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      margin-bottom: 0.35rem;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9rem;
      cursor: default;
      transition: background 0.2s, color 0.2s;
    }

    .kb-item:hover {
      background: var(--accent-soft);
      color: #fff;
    }

    .kb-item svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    .col-footer {
      padding: 0.75rem 1rem 1.25rem;
      margin-top: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.7rem 1rem;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition:
        border-color 0.25s,
        box-shadow 0.25s,
        background 0.25s,
        transform 0.15s;
    }

    .btn:hover {
      border-color: var(--border-strong);
      box-shadow:
        0 0 0 1px rgba(91, 140, 255, 0.15),
        0 0 24px var(--accent-glow),
        0 4px 16px rgba(0, 0, 0, 0.35);
      background: linear-gradient(180deg, #1e2433 0%, var(--bg-elevated) 100%);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn--primary {
      background: linear-gradient(180deg, rgba(91, 140, 255, 0.25) 0%, rgba(91, 140, 255, 0.08) 100%);
      border-color: rgba(91, 140, 255, 0.35);
    }

    .btn--primary:hover {
      background: linear-gradient(180deg, rgba(91, 140, 255, 0.35) 0%, rgba(91, 140, 255, 0.12) 100%);
    }

    .center-head {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #5b8cff 0%, #3d5a99 50%, #2a3f6b 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 20px rgba(91, 140, 255, 0.35);
    }

    .logo svg {
      width: 24px;
      height: 24px;
    }

    .center-head h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .center-head .sub {
      margin: 0.15rem 0 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1rem 1.25rem 1.25rem;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 92%;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      font-size: 0.925rem;
      line-height: 1.55;
    }

    .msg--assistant {
      align-self: flex-start;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg--user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(91, 140, 255, 0.2) 0%, rgba(91, 140, 255, 0.08) 100%);
      border: 1px solid rgba(91, 140, 255, 0.25);
    }

    .composer {
      display: flex;
      gap: 0.65rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .composer input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .composer input::placeholder {
      color: var(--text-muted);
    }

    .composer input:focus {
      border-color: rgba(91, 140, 255, 0.45);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.12);
    }

    .composer .btn {
      width: auto;
      min-width: 96px;
      padding-left: 1.25rem;
      padding-right: 1.25rem;
    }

    .actions-head {
      padding: 1.25rem 1.25rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      padding: 0 1rem 1rem;
    }

    .action-grid .btn {
      font-size: 0.8rem;
      padding: 0.65rem 0.5rem;
      text-align: center;
      line-height: 1.35;
      min-height: 3.25rem;
    }

    .recent-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-top: 1px solid var(--border);
      padding: 1rem 1rem 1.25rem;
      background: rgba(0, 0, 0, 0.15);
    }

    .recent-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .recent-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.65rem 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
    }

    .recent-item .task {
      color: var(--text);
      line-height: 1.4;
    }

    .recent-item time {
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      padding: 0.75rem 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 0 24px rgba(91, 140, 255, 0.2);
      z-index: 1000;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
      pointer-events: none;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 900px) {
      .app {
        flex-direction: column;
      }

      .col--left,
      .col--center,
      .col--right {
        flex: 1 1 auto;
        max-width: 100%;
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .col--center {
        order: -1;
        min-height: 70vh;
      }

      .action-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .action-grid {
        grid-template-columns: 1fr;
      }

      .center-head {
        flex-wrap: wrap;
      }

      .composer {
        flex-direction: column;
      }

      .composer .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="col col--left">
      <div class="panel-header">ナレッジベース</div>
      <div class="kb-list">
        <div class="kb-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5C3 6.11929 4.11929 5 5.5 5H9.08579C9.351 5 9.60536 5.10536 9.79289 5.29289L12 7.5H18.5C19.8807 7.5 21 8.61929 21 10V17.5C21 18.8807 19.8807 20 18.5 20H5.5C4.11929 20 3 18.8807 3 17.5V7.5Z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          社内規定
        </div>
        <div class="kb-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5C3 6.11929 4.11929 5 5.5 5H9.08579C9.351 5 9.60536 5.10536 9.79289 5.29289L12 7.5H18.5C19.8807 7.5 21 8.61929 21 10V17.5C21 18.8807 19.8807 20 18.5 20H5.5C4.11929 20 3 18.8807 3 17.5V7.5Z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          議事録
        </div>
        <div class="kb-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5C3 6.11929 4.11929 5 5.5 5H9.08579C9.351 5 9.60536 5.10536 9.79289 5.29289L12 7.5H18.5C19.8807 7.5 21 8.61929 21 10V17.5C21 18.8807 19.8807 20 18.5 20H5.5C4.11929 20 3 18.8807 3 17.5V7.5Z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          製品資料
        </div>
        <div class="kb-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5C3 6.11929 4.11929 5 5.5 5H9.08579C9.351 5 9.60536 5.10536 9.79289 5.29289L12 7.5H18.5C19.8807 7.5 21 8.61929 21 10V17.5C21 18.8807 19.8807 20 18.5 20H5.5C4.11929 20 3 18.8807 3 17.5V7.5Z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          マニュアル
        </div>
      </div>
      <div class="col-footer">
        <button type="button" class="btn btn--primary js-prep">＋ ファイルを追加</button>
      </div>
    </aside>

    <main class="col col--center">
      <header class="center-head">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L4 8V16L12 20L20 16V8L12 4Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M12 12L20 8M12 12V20M12 12L4 8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>AI Command Center</h1>
          <p class="sub">AI Business Command Center</p>
        </div>
      </header>

      <div class="chat-wrap">
        <div class="messages" id="messages">
          <div class="msg msg--assistant">どのようにお手伝いできますか？</div>
        </div>
        <div class="composer">
          <input type="text" id="chatInput" placeholder="メッセージを入力…" autocomplete="off" />
          <button type="button" class="btn btn--primary js-send-chat" id="sendChatBtn">送信</button>
        </div>
      </div>
    </main>

    <aside class="col col--right">
      <div class="actions-head">ワンクリックアクション</div>
      <div class="action-grid">
        <button type="button" class="btn js-prep">議事録を作成</button>
        <button type="button" class="btn js-prep">メールを下書き</button>
        <button type="button" class="btn js-prep">提案書を作成</button>
        <button type="button" class="btn js-prep">日程を調整</button>
        <button type="button" class="btn js-prep">データを分析</button>
        <button type="button" class="btn js-prep">契約書を確認</button>
      </div>

      <div class="recent-section">
        <div class="recent-title">最近の作業</div>
        <div class="recent-list">
          <div class="recent-item">
            <span class="task">四半期レポートの要約</span>
            <time datetime="2026-04-12T14:30">14:30</time>
          </div>
          <div class="recent-item">
            <span class="task">顧客向けメールの下書き</span>
            <time datetime="2026-04-12T11:05">11:05</time>
          </div>
          <div class="recent-item">
            <span class="task">契約書ドラフトのレビュー</span>
            <time datetime="2026-04-11T17:42">昨日 17:42</time>
          </div>
          <div class="recent-item">
            <span class="task">週次ミーティング議事録</span>
            <time datetime="2026-04-11T10:15">昨日 10:15</time>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">準備中です</div>

  <script>
    (function () {
      var toast = document.getElementById("toast");
      var hideTimer;
      var messagesEl = document.getElementById("messages");
      var chatInput = document.getElementById("chatInput");
      var sendBtn = document.getElementById("sendChatBtn");

      var chatHistory = [
        { role: "assistant", content: "どのようにお手伝いできますか？" },
      ];

      var systemMessage = {
        role: "system",
        content:
          "You are a helpful assistant for the AI Business Command Center. Answer concisely and professionally. Use Japanese when the user writes in Japanese.",
      };

      function showToast() {
        toast.textContent = "準備中です";
        toast.classList.add("visible");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function () {
          toast.classList.remove("visible");
        }, 2200);
      }

      document.querySelectorAll(".js-prep").forEach(function (btn) {
        btn.addEventListener("click", showToast);
      });

      function appendMessage(role, text) {
        var div = document.createElement("div");
        div.className = "msg msg--" + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function buildApiMessages() {
        return [systemMessage].concat(chatHistory);
      }

      async function sendChat() {
        var text = (chatInput.value || "").trim();
        if (!text) return;

        chatInput.value = "";
        appendMessage("user", text);
        chatHistory.push({ role: "user", content: text });

        sendBtn.disabled = true;
        try {
          var res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: buildApiMessages() }),
          });
          var data = await res.json().catch(function () {
            return {};
          });
          if (!res.ok) {
            appendMessage(
              "assistant",
              "エラー: " + (data.error || res.statusText || "不明なエラー")
            );
            chatHistory.pop();
            return;
          }
          var reply = typeof data.message === "string" ? data.message : "";
          appendMessage("assistant", reply);
          chatHistory.push({ role: "assistant", content: reply });
        } catch (e) {
          appendMessage("assistant", "通信に失敗しました。ネットワークをご確認ください。");
          chatHistory.pop();
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener("click", sendChat);
      chatInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          sendChat();
        }
      });
    })();
  </script>
</body>
</html>
